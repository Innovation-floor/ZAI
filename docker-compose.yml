name: zai-poc

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: zai/api:1.0.0-poc
    pull_policy: build            # image is local only; never attempt a registry pull
    restart: unless-stopped
    env_file: [.env]
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL:   ${LOG_LEVEL:-INFO}
      LOG_FORMAT:  ${LOG_FORMAT:-json}
    expose: ["8000"]
    # Published only for direct access to /api/docs. nginx proxies /api anyway,
    # so this mapping can be deleted entirely if the host port is contested.
    # Default is 8010 to avoid colliding with other FastAPI services on 8000.
    ports: ["${API_PORT:-8010}:8000"]
    # Reach an Ollama daemon running on the host. Docker Desktop resolves
    # host.docker.internal natively; on Linux this maps it to the host gateway.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD","curl","-fsS","http://localhost:8000/api/health/live"]
      interval: 20s
      timeout: 4s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits: {cpus: "2.0", memory: 1g}
    security_opt: ["no-new-privileges:true"]
    read_only: true
    tmpfs: ["/tmp"]
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: zai/web:1.0.0-poc
    pull_policy: build            # image is local only; never attempt a registry pull
    restart: unless-stopped
    ports: ["${WEB_PORT:-8080}:8080"]
    depends_on:
      api: {condition: service_healthy}
    healthcheck:
      test: ["CMD","curl","-fsS","http://localhost:8080/healthz"]
      interval: 20s
      timeout: 4s
      retries: 3
    security_opt: ["no-new-privileges:true"]
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}
